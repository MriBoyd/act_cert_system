{% extends 'base.html' %}
{% block title %}{% if is_edit %}Edit Template{% else %}Create Template{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-3"><i class="bi bi-layout-text-window-reverse me-1"></i>{% if is_edit %}Edit Certificate Template{% else %}Create Certificate Template{% endif %}</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i>{% if is_edit %}Update Template{% else %}Save Template{% endif %}</button>
                    <a href="{% url 'admin-template-list' %}" class="btn btn-outline-secondary ms-1"><i class="bi bi-arrow-left me-1"></i>Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
