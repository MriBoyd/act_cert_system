{% extends 'base.html' %}
{% load static %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <img class="app-logo" src="{% static 'img/act-dev-community.png' %}" alt="ACT DEV COMMUNITY" />
                    <h3 class="mb-0"><i class="bi bi-person-lock me-1"></i>Admin Login</h3>
                </div>
                <p class="text-muted">Sign in to manage certificate templates and issuance.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
