{% extends 'base.html' %}
{% block title %}Generate Certificate{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-3"><i class="bi bi-file-earmark-plus me-1"></i>Generate Single Certificate</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit"><i class="bi bi-stars me-1"></i>Generate</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
