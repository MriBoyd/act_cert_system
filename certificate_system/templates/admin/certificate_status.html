{% extends 'base.html' %}
{% block title %}Certificate Status{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-1"><i class="bi bi-sliders me-1"></i>Update Certificate Status</h4>
                <p class="text-muted">Certificate ID: {{ certificate.id }}</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit"><i class="bi bi-check2-circle me-1"></i>Update Status</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
